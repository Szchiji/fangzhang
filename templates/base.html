<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CheBot Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: '#6366f1' } } }
    }
  </script>
  <style>
    .sidebar-link { @apply flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors; }
    .sidebar-link:hover { @apply bg-white/10; }
    .sidebar-link.active { @apply bg-white/20; }
    .stat-card { @apply bg-white dark:bg-gray-800 rounded-xl shadow p-5 flex flex-col gap-1; }
  </style>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100">
<div class="flex h-full min-h-screen">

  <!-- Sidebar -->
  <aside class="w-60 bg-indigo-700 text-white flex flex-col shrink-0">
    <div class="px-6 py-5 border-b border-indigo-600">
      <h1 class="text-xl font-bold">🤖 CheBot</h1>
      <p class="text-xs text-indigo-200 mt-0.5">管理后台</p>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="/dashboard" class="sidebar-link {% if request.url.path == '/dashboard' %}active{% endif %}">
        📊 数据概览
      </a>
      <a href="/users" class="sidebar-link {% if '/users' in request.url.path %}active{% endif %}">
        👥 认证用户
      </a>
      <a href="/ratings" class="sidebar-link {% if '/ratings' in request.url.path %}active{% endif %}">
        ⭐ 评价审核
      </a>
      <a href="/coupons" class="sidebar-link {% if '/coupons' in request.url.path %}active{% endif %}">
        🎫 优惠券
      </a>
      <a href="/settings" class="sidebar-link {% if '/settings' in request.url.path %}active{% endif %}">
        ⚙️ 群组设置
      </a>
      <a href="/risk" class="sidebar-link {% if '/risk' in request.url.path %}active{% endif %}">
        🛡️ 风控中心
      </a>
    </nav>
    <div class="p-4 border-t border-indigo-600 text-xs text-indigo-300">
      CheBot v1.0
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white dark:bg-gray-800 shadow-sm px-6 py-4 flex items-center justify-between">
      <h2 class="text-lg font-semibold">{% block page_title %}Dashboard{% endblock %}</h2>
      <div class="flex items-center gap-3">
        <button onclick="toggleDark()" class="text-sm px-3 py-1.5 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
          🌙 切换主题
        </button>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

</div>
<script>
  function toggleDark() {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('dark', document.documentElement.classList.contains('dark'));
  }
  if (localStorage.getItem('dark') === 'true') {
    document.documentElement.classList.add('dark');
  }

  async function apiCall(method, url, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    return r.json();
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
