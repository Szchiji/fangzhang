{% extends "base.html" %}
{% block title %}{{ '编辑' if user else '添加' }}用户 — CheBot{% endblock %}
{% block page_title %}{{ '✏️ 编辑认证用户' if user else '➕ 添加认证用户' }}{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-6">
    <form method="post" action="/users/save">
      {% if user %}
      <input type="hidden" name="cert_id" value="{{ user.id }}" />
      {% endif %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <!-- Display name -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">显示名称 <span class="text-red-500">*</span></label>
          <input name="display_name" required value="{{ user.display_name if user else '' }}"
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>

        <!-- Username -->
        <div>
          <label class="block text-sm font-medium mb-1">Telegram 用户名</label>
          <input name="username" value="{{ user.username if user else '' }}" placeholder="@username"
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>

        <!-- Category -->
        <div>
          <label class="block text-sm font-medium mb-1">分类</label>
          <input name="category" value="{{ user.category if user else 'general' }}" placeholder="美食、健身、摄影..."
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>

        <!-- Region -->
        <div>
          <label class="block text-sm font-medium mb-1">地区/省份</label>
          <input name="region" value="{{ user.region if user else '' }}" placeholder="广东省"
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>

        <!-- City -->
        <div>
          <label class="block text-sm font-medium mb-1">城市</label>
          <input name="city" value="{{ user.city if user else '' }}" placeholder="深圳"
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>

        <!-- Level -->
        <div>
          <label class="block text-sm font-medium mb-1">等级 (1-5)</label>
          <input name="level" type="number" min="1" max="5" value="{{ user.level if user else 1 }}"
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>

        <!-- Status -->
        <div>
          <label class="block text-sm font-medium mb-1">状态</label>
          <select name="status"
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            <option value="active" {% if not user or user.status == 'active' %}selected{% endif %}>活跃</option>
            <option value="frozen" {% if user and user.status == 'frozen' %}selected{% endif %}>冻结</option>
            <option value="hidden" {% if user and user.status == 'hidden' %}selected{% endif %}>隐藏</option>
            <option value="blacklisted" {% if user and user.status == 'blacklisted' %}selected{% endif %}>黑名单</option>
          </select>
        </div>

        <!-- Valid from -->
        <div>
          <label class="block text-sm font-medium mb-1">生效日期</label>
          <input name="valid_from" type="date" value="{{ user.valid_from.strftime('%Y-%m-%d') if user and user.valid_from else '' }}"
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>

        <!-- Valid until -->
        <div>
          <label class="block text-sm font-medium mb-1">到期日期（空=永久）</label>
          <input name="valid_until" type="date" value="{{ user.valid_until.strftime('%Y-%m-%d') if user and user.valid_until else '' }}"
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>

        <!-- Contact -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">联系方式</label>
          <input name="contact" value="{{ user.contact if user else '' }}" placeholder="微信号、电话等"
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>

        <!-- Bio -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">简介</label>
          <textarea name="bio" rows="3" placeholder="用户简介..."
            class="w-full rounded-lg border dark:border-gray-600 dark:bg-gray-700 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-none">{{ user.bio if user else '' }}</textarea>
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button type="submit"
          class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
          {{ '保存修改' if user else '添加用户' }}
        </button>
        <a href="/users"
          class="px-6 py-2.5 rounded-lg text-sm font-medium bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
          取消
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
